# Config for the "weekly-sync" cron service on Railway.
# In the service settings, set "Config-as-code file path" to this file.

[build]
builder = "nixpacks"

[deploy]
startCommand = "python -m pdc.sync_runner"
# Wednesdays at 2 PM UTC (10 AM NYC)
cronSchedule = "0 14 * * 3"
restartPolicyType = "never"
